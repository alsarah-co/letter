<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Letter For You 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Sacramento&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #f4a7b5;
      --pink-dark:  #e8889a;
      --pink-light: #f9cdd6;
      --pink-mid:   #f0b8c4;
      --outline:    #b5606e;
      --red:        #d63a4a;
      --red-dark:   #b02535;
      --ink:        #2a1520;
      --rose:       #c0415a;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fff0f3 0%, #fff8f5 50%, #fdf0f8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      padding: 60px 20px;
      gap: 28px;
      overflow-x: hidden;
    }

    /* ── bg drifting hearts ── */
    .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-h { position: absolute; color: #e07a90; opacity: 0.06; animation: bgRise linear infinite; }
    @keyframes bgRise {
      from { transform: translateY(110vh); opacity: 0.06; }
      to   { transform: translateY(-12vh); opacity: 0; }
    }

    /* ══════════════════
       ENVELOPE STAGE
    ══════════════════ */
    .stage {
      position: relative;
      z-index: 1;
      width: min(340px, 88vw);
      cursor: pointer;
    }

    /* ── SVG envelope drawn via CSS shapes ── */
    .envelope-svg {
      width: 100%;
      display: block;
      filter: drop-shadow(0 10px 30px rgba(180,50,80,0.18));
      transition: filter 0.3s;
    }
    .stage:hover .envelope-svg { filter: drop-shadow(0 14px 38px rgba(180,50,80,0.28)); }

    /* heart seal on top of SVG */
    .heart-seal {
      position: absolute;
      /* center of envelope — roughly 50% left, 50% top of the SVG */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18%;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      z-index: 10;
    }
    .stage.open .heart-seal {
      opacity: 0;
      transform: translate(-50%, -60%) scale(0.6);
    }

    /* hint */
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--rose);
      opacity: 0.55;
      letter-spacing: 0.12em;
      margin-top: 10px;
      font-weight: 300;
      transition: opacity 0.4s;
    }
    .hint.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════════
       LETTER CARD
    ══════════════════ */
    .letter-card {
      position: relative;
      z-index: 1;
      width: min(340px, 88vw);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(180,50,80,0.11), 0 1px 6px rgba(0,0,0,0.06);
      padding: 30px 24px 26px;
      opacity: 0;
      transform: translateY(40px);
      max-height: 0;
      overflow: hidden;
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .letter-card.visible {
      opacity: 1;
      transform: translateY(0);
      max-height: 9999px;
      overflow: visible;
      pointer-events: auto;
    }

    .letter-top { text-align: center; margin-bottom: 16px; }
    .letter-top-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .letter-greeting { font-family: 'Sacramento', cursive; color: var(--rose); font-size: 2rem; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 0; color: #e8c0c8; font-size: 0.9rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f0dde0; }

    .letter-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; line-height: 2;
      color: var(--ink); white-space: pre-wrap;
    }
    .letter-sign {
      margin-top: 20px; text-align: right;
      font-family: 'Sacramento', cursive;
      font-size: 1.5rem; color: var(--rose);
    }

    /* ══════════════════
       RESET BUTTON
    ══════════════════ */
    .btn-reset {
      position: relative; z-index: 2;
      padding: 11px 34px;
      background: #fff; color: var(--rose);
      border: 1.5px solid #f0d0d8;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(180,50,80,0.1);
      opacity: 0; pointer-events: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.5s;
    }
    .btn-reset.visible { opacity: 1; pointer-events: auto; }
    .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(180,50,80,0.18); }

    /* ══════════════════
       BURST HEARTS
    ══════════════════ */
    .burst {
      position: fixed; pointer-events: none; z-index: 999;
      animation: burstUp var(--dur, 1.4s) ease-out forwards;
    }
    @keyframes burstUp {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.1) rotate(var(--dr)); }
    }
  </style>
</head>
<body>

  <div class="bg-layer" id="bgLayer"></div>

  <div class="stage" id="stage" onclick="openEnvelope()">

    <!-- Envelope drawn as SVG (pink cartoon style) -->
    <svg class="envelope-svg" viewBox="0 0 400 270" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- open flap clip: shows only bottom part when flap is open -->
        <clipPath id="bodyClip">
          <rect x="0" y="0" width="400" height="270"/>
        </clipPath>
      </defs>

      <!-- envelope body -->
      <rect x="8" y="8" width="384" height="254" rx="18" ry="18"
            fill="#f4a7b5" stroke="#b5606e" stroke-width="5"/>

      <!-- left triangle fold -->
      <polygon points="8,8 8,262 210,148"
               fill="#f0b0be" stroke="#b5606e" stroke-width="3" stroke-linejoin="round"/>

      <!-- right triangle fold -->
      <polygon points="392,8 392,262 190,148"
               fill="#ebb8c4" stroke="#b5606e" stroke-width="3" stroke-linejoin="round"/>

      <!-- bottom triangle fold -->
      <polygon points="8,262 392,262 200,140"
               fill="#f4a7b5" stroke="#b5606e" stroke-width="3" stroke-linejoin="round"/>

      <!-- top flap (closed state) — rotates away when open -->
      <g id="flapGroup" style="transform-origin:200px 8px; transform-box:fill-box;">
        <polygon id="flapPoly" points="8,8 392,8 200,148"
                 fill="#f9cdd6" stroke="#b5606e" stroke-width="3.5" stroke-linejoin="round"/>
        <!-- subtle gloss on flap -->
        <polygon points="60,10 180,10 130,80"
                 fill="white" opacity="0.18"/>
      </g>

      <!-- envelope outline on top -->
      <rect x="8" y="8" width="384" height="254" rx="18" ry="18"
            fill="none" stroke="#b5606e" stroke-width="5"/>

      <!-- gloss highlight top-left -->
      <path d="M30,20 Q80,14 130,22" stroke="white" stroke-width="5"
            stroke-linecap="round" fill="none" opacity="0.45"/>
      <!-- gloss right side -->
      <path d="M375,60 Q382,120 376,180" stroke="white" stroke-width="4"
            stroke-linecap="round" fill="none" opacity="0.3"/>
    </svg>

    <!-- Heart seal SVG — centered over the envelope -->
    <svg class="heart-seal" id="heartSeal" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <path d="M50,80 C50,80 5,50 5,25 C5,12 15,5 28,8 C36,10 44,17 50,25 C56,17 64,10 72,8 C85,5 95,12 95,25 C95,50 50,80 50,80 Z"
            fill="#d63a4a" stroke="#8b1a2a" stroke-width="3"/>
      <!-- gloss -->
      <ellipse cx="36" cy="24" rx="10" ry="6" fill="white" opacity="0.35" transform="rotate(-20 36 24)"/>
      <ellipse cx="44" cy="19" rx="4" ry="3" fill="white" opacity="0.5" transform="rotate(-20 44 19)"/>
    </svg>

    <p class="hint" id="hint">tap to open 💌</p>
  </div>

  <!-- LETTER -->
  <div class="letter-card" id="letterCard">
    <div class="letter-top">
      <span class="letter-top-icon">🤍</span>
      <div class="letter-greeting">For You</div>
    </div>
    <div class="divider">❤</div>
    <div class="letter-body" id="letterBody"></div>
    <div class="letter-sign">With all my love ❤️</div>
  </div>

  <button class="btn-reset" id="resetBtn" onclick="resetAll()">Reset ↩</button>

  <script>
    document.getElementById('letterBody').textContent =
`Dear Baby,
I know you're not really into paper notes, so I made this for you instead 🤍

I'm so, so proud of you. You work incredibly hard every single day, and I admire your dedication more than words can say. You're truly the best, and I see how much effort and heart you put into everything you do.

I appreciate you so much, and I know that one day you're going to become something really great and achieve everything you dream of — you deserve it all.

I love you 

I got you these comfy shoes because I know how much you're on your feet all day, always giving your best and taking care of others. I hope they make your days a little easier.

I hope you like them,
From Baby.`;

    /* bg hearts */
    const bgLayer = document.getElementById('bgLayer');
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'bg-h';
      h.textContent = ['❤','♡','💕'][i % 3];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (0.7 + Math.random() * 1.8) + 'rem';
      h.style.animationDuration = (11 + Math.random() * 13) + 's';
      h.style.animationDelay = (-Math.random() * 13) + 's';
      bgLayer.appendChild(h);
    }

    const stage      = document.getElementById('stage');
    const flapGroup  = document.getElementById('flapGroup');
    const hint       = document.getElementById('hint');
    const letterCard = document.getElementById('letterCard');
    const resetBtn   = document.getElementById('resetBtn');
    let opened = false;

    /* animate flap via CSS transition on SVG group */
    function animateFlap() {
      flapGroup.style.transition = 'transform 0.75s cubic-bezier(0.4,0,0.2,1)';
      flapGroup.style.transformOrigin = '200px 8px';
      flapGroup.style.transform = 'rotateX(180deg)';
    }
    function resetFlap() {
      flapGroup.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
      flapGroup.style.transform = 'rotateX(0deg)';
    }

    /* spawn hearts flying up */
    function spawnHearts() {
      const emojis = ['❤️','💕','💖','💗','🤍','💓'];
      const rect = stage.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * 0.4;

      for (let i = 0; i < 24; i++) {
        const b = document.createElement('span');
        b.className = 'burst';
        b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        b.style.left = (cx + (Math.random() - 0.5) * rect.width * 0.7) + 'px';
        b.style.top  = cy + 'px';
        b.style.fontSize = (0.9 + Math.random() * 1.3) + 'rem';
        const spread = (Math.random() - 0.5) * 180;
        const rise   = -(90 + Math.random() * 280);
        b.style.setProperty('--dx', spread + 'px');
        b.style.setProperty('--dy', rise + 'px');
        b.style.setProperty('--dr', (Math.random() * 60 - 30) + 'deg');
        b.style.setProperty('--dur', (1.2 + Math.random() * 0.7) + 's');
        b.style.animationDelay = (Math.random() * 0.4) + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 2500);
      }
    }

    function openEnvelope() {
      if (opened) return;
      opened = true;

      hint.classList.add('hidden');
      stage.style.cursor = 'default';

      // hearts fly
      spawnHearts();

      // heart seal fades (via .open class)
      stage.classList.add('open');

      // flap opens upward
      animateFlap();

      // show letter after flap
      setTimeout(() => {
        letterCard.classList.add('visible');
        resetBtn.classList.add('visible');
        setTimeout(() => letterCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
      }, 800);
    }

    function resetAll() {
      opened = false;
      stage.classList.remove('open');
      stage.style.cursor = 'pointer';
      hint.classList.remove('hidden');
      resetFlap();
      letterCard.classList.remove('visible');
      resetBtn.classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
